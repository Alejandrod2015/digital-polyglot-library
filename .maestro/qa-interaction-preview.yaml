appId: com.digitalpolyglot.mobile
---
- launchApp:
    clearState: false

- runFlow:
    when:
      visible:
        id: "qa-reader-screen"
    commands:
      - tapOn:
          id: "qa-reader-back"

- runFlow:
    when:
      visible:
        id: "qa-book-detail-screen"
    commands:
      - tapOn:
          id: "qa-book-detail-back"

- runFlow:
    when:
      visible: "Browse preview catalog"
    commands:
      - tapOn:
          text: "Browse preview catalog"

- tapOn:
    id: "qa-tab-home"
- assertVisible:
    id: "qa-home-latest-books-section"

- scrollUntilVisible:
    element:
      id: "qa-home-latest-stories-section"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 40

- tapOn:
    id: "qa-tab-explore"
- assertVisible:
    id: "qa-explore-search-input"

- scrollUntilVisible:
    element:
      id: "qa-explore-book-card-0"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 40

- tapOn:
    id: "qa-explore-book-card-0"
- assertVisible:
    id: "qa-book-detail-screen"

- scrollUntilVisible:
    element:
      id: "qa-book-start-reading"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 30

- tapOn:
    id: "qa-book-start-reading"
- assertVisible:
    id: "qa-reader-screen"

- tapOn:
    id: "qa-reader-back"
- assertVisible:
    id: "qa-book-detail-screen"

- tapOn:
    id: "qa-book-detail-back"
- tapOn:
    id: "qa-tab-favorites"
- assertVisible:
    id: "qa-tab-favorites"

- runFlow:
    when:
      visible:
        id: "qa-tab-journey"
    commands:
      - tapOn:
          id: "qa-tab-journey"
      - assertVisible:
          id: "qa-journey-map-section"

- takeScreenshot: "interaction-preview-pass"
