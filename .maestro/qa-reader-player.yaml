appId: com.digitalpolyglot.mobile
---
- launchApp:
    clearState: false

- runFlow:
    when:
      visible:
        id: "qa-reader-screen"
    commands:
      - tapOn:
          id: "qa-reader-back"

- runFlow:
    when:
      visible:
        id: "qa-book-detail-screen"
    commands:
      - tapOn:
          id: "qa-book-detail-back"

- runFlow:
    when:
      visible: "Browse preview catalog"
    commands:
      - tapOn:
          text: "Browse preview catalog"

- tapOn:
    id: "qa-tab-explore"
- scrollUntilVisible:
    element:
      id: "qa-explore-book-card-0"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 40
- tapOn:
    id: "qa-explore-book-card-0"
- assertVisible:
    id: "qa-book-detail-screen"
- scrollUntilVisible:
    element:
      id: "qa-book-start-reading"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 30
- tapOn:
    id: "qa-book-start-reading"
- assertVisible:
    id: "qa-reader-screen"

- tapOn:
    id: "qa-player-speed"
- assertVisible:
    id: "qa-player-speed"

- tapOn:
    id: "qa-player-play-toggle"
- assertVisible:
    id: "qa-player-play-toggle"

- runFlow:
    when:
      visible:
        id: "qa-player-next"
    commands:
      - tapOn:
          id: "qa-player-next"
      - assertVisible:
          id: "qa-reader-screen"

- takeScreenshot: "reader-player-after-next"
