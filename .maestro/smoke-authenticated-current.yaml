appId: com.digitalpolyglot.mobile
---
- runFlow:
    when:
      visible:
        id: "qa-reader-screen"
    commands:
      - tapOn:
          id: "qa-reader-back"

- runFlow:
    when:
      visible:
        id: "qa-book-detail-screen"
    commands:
      - tapOn:
          id: "qa-book-detail-back"

- tapOn:
    text: "Digital Polyglot"
    optional: true

- tapOn:
    text: "Abrir"
    optional: true

- tapOn:
    text: "Open"
    optional: true

- tapOn:
    id: "qa-onboarding-option-0-spanish"
    optional: true
- tapOn:
    id: "qa-onboarding-next"
    optional: true
- tapOn:
    id: "qa-onboarding-option-1-beginner"
    optional: true
- tapOn:
    id: "qa-onboarding-next"
    optional: true
- tapOn:
    id: "qa-onboarding-option-2-latam"
    optional: true
- tapOn:
    id: "qa-onboarding-next"
    optional: true
- tapOn:
    id: "qa-onboarding-option-3-colombia"
    optional: true
- tapOn:
    id: "qa-onboarding-next"
    optional: true
- tapOn:
    id: "qa-onboarding-option-4-travel"
    optional: true
- tapOn:
    id: "qa-onboarding-option-4-food"
    optional: true
- tapOn:
    id: "qa-onboarding-next"
    optional: true
- tapOn:
    id: "qa-onboarding-option-5-travel"
    optional: true
- tapOn:
    id: "qa-onboarding-next"
    optional: true
- tapOn:
    id: "qa-onboarding-option-6-5"
    optional: true
- tapOn:
    id: "qa-onboarding-next"
    optional: true
- tapOn:
    id: "qa-onboarding-tour-next"
    optional: true
- tapOn:
    id: "qa-onboarding-tour-next"
    optional: true
- tapOn:
    id: "qa-onboarding-tour-next"
    optional: true
- tapOn:
    id: "qa-onboarding-tour-next"
    optional: true
- tapOn:
    id: "qa-onboarding-tour-next"
    optional: true

- runFlow:
    when:
      visible:
        id: "qa-reader-screen"
    commands:
      - tapOn:
          id: "qa-reader-back"

- runFlow:
    when:
      visible:
        id: "qa-book-detail-screen"
    commands:
      - tapOn:
          id: "qa-book-detail-back"

- runFlow:
    when:
      visible:
        id: "qa-tab-home"
    commands:
      - tapOn:
          id: "qa-tab-home"

- assertVisible:
    id: "qa-tab-home"
- assertVisible:
    id: "qa-tab-explore"
- assertVisible:
    id: "qa-tab-practice"
- assertVisible:
    id: "qa-tab-favorites"
- assertVisible:
    id: "qa-tab-journey"

- takeScreenshot: "01-home-shell"

- tapOn:
    id: "qa-tab-explore"
- assertVisible:
    id: "qa-explore-search-input"
- assertVisible: "Books"
- assertVisible: "Stories"
- takeScreenshot: "02-explore"

- tapOn:
    id: "qa-explore-open-first-book"
- assertVisible:
    id: "qa-book-detail-screen"
- scrollUntilVisible:
    element:
      id: "qa-book-start-reading"
    direction: DOWN
    timeout: 120000
- takeScreenshot: "03-book-detail"

- tapOn:
    id: "qa-book-start-reading"
- assertVisible:
    id: "qa-reader-screen"
- takeScreenshot: "04-reader"

- tapOn:
    id: "qa-reader-back"
- assertVisible:
    id: "qa-book-detail-screen"

- tapOn:
    id: "qa-book-detail-back"
- tapOn:
    id: "qa-tab-practice"
- assertVisible:
    id: "qa-tab-practice"
- takeScreenshot: "05-practice"

- tapOn:
    id: "qa-tab-favorites"
- assertVisible:
    id: "qa-tab-favorites"
- takeScreenshot: "06-favorites"

- tapOn:
    id: "qa-tab-journey"
- assertVisible:
    id: "qa-tab-journey"
- tapOn:
    id: "qa-journey-topic-community-celebrations"
    optional: true
- assertVisible:
    id: "qa-journey-topic-detail"
    optional: true
- takeScreenshot: "07-journey"
