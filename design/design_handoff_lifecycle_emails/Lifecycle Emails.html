<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lifecycle Emails — Digital Polyglot</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,600;0,700;0,800;0,900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#051834" />
    <rect x="30" y="30" width="40" height="40" rx="11" fill="url(#g)" />
    <text x="50" y="57" font-family="sans-serif" font-weight="900" font-size="18" fill="#051834" text-anchor="middle">dp</text>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcd34d" /><stop offset="1" stop-color="#7dd3fc" />
    </linearGradient></defs>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="email-kit.jsx"></script>
<script type="text/babel" src="lifecycle-emails.jsx"></script>
<script type="text/babel">
  function App() {
    const nv = { background: DPE.navy };
    return (
      <DesignCanvas>
        <DCSection id="seq" title="Lifecycle email sequence" subtitle="Digital Polyglot · 560px · dark-first · one alternative per email">
          <DCArtboard id="e1" label="1 · Welcome (decided)" width={560} height={956} style={nv}><EmailWelcome /></DCArtboard>
          <DCArtboard id="e2" label="2 · Activation nudge · +24h" width={560} height={682} style={nv}><EmailNudge /></DCArtboard>
          <DCArtboard id="e3" label="3 · Celebration · on complete" width={560} height={648} style={nv}><EmailCelebration /></DCArtboard>
          <DCArtboard id="e4" label="4 · How it works · day 3" width={560} height={790} style={nv}><EmailHowItWorks /></DCArtboard>
          <DCArtboard id="e5" label="5 · Weekly recap · day 7" width={560} height={718} style={nv}><EmailRecap /></DCArtboard>
          <DCArtboard id="e6" label="6 · Next story · day 10-14" width={560} height={713} style={nv}><EmailNext /></DCArtboard>
          <DCArtboard id="e7a" label="7a · Win-back · Reminder" width={560} height={625} style={nv}><EmailWinReminder /></DCArtboard>
          <DCArtboard id="e7b" label="7b · Win-back · Value" width={560} height={698} style={nv}><EmailWinValue /></DCArtboard>
          <DCArtboard id="e7c" label="7c · Win-back · Sunset" width={560} height={554} style={nv}><EmailWinSunset /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
